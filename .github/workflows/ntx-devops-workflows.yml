name: ntx-devops-test-workflow

on:
  push:
    branches: [ "feature" ]

jobs:
  run_test:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: 18.x
        cache: 'npm'
    - run: npm i
    - run: npm run build --if-present
    - run: npm install chai@4.3.7
    - run: npm test

  build_and_push_image:

    needs: [run_test]

    runs-on: ubuntu-latest

    env:
      APP_NAME: ntx-app
      GITHUB_SHA: ${{ github.sha }}

    outputs:
      image-tag: ${{ steps.image-tag.outputs.IMAGE_TAG }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Verify Azure Login
      run: az account show

    - name: Build Docker OCI Image
      run: |
        SHORT_SHA=$(echo "${{env.GITHUB_SHA}}" | cut -c1-6)
        docker build . --file docker/Dockerfile --tag ${{env.APP_NAME}}:$SHORT_SHA
        echo "APP_IMAGE=${{env.APP_NAME}}:$SHORT_SHA" >> $GITHUB_ENV
    - name: Check Docker OCI Image
      run: |
        docker images | grep ${{env.APP_NAME}}

    - name: Prepare Terraform tfvars
      run: |
        echo "azure_resource_group_name=\"${{ vars.TF_VAR_AZURE_RESOURCE_GROUP_NAME }}\"" > terraform/terraform.tfvars
        echo "azure_resource_group_location=\"${{ vars.TF_VAR_AZURE_RESOURCE_GROUP_LOCATION }}\"" >> terraform/terraform.tfvars
        echo "acr_name=\"${{ vars.TF_VAR_ACR_NAME }}\"" >> terraform/terraform.tfvars
        echo "azure_subscription_id=\"${{ secrets.TF_VAR_SUBS_ID }}\"" >> terraform/terraform.tfvars
        echo "terraform_azure_client_id=\"${{ secrets.TF_VAR_CLIENT_ID }}\"" >> terraform/terraform.tfvars
        echo "terraform_azure_client_secret=\"${{ secrets.TF_VAR_CLIENT_SECRET }}\"" >> terraform/terraform.tfvars
        echo "azure_tenant_id=\"${{ secrets.TF_VAR_TENANT_ID }}\"" >> terraform/terraform.tfvars
        cat terraform/terraform.tfvars

    - name: Provision ACR and AKS with Terraform
      run: |
        cd terraform
        terraform init
        terraform plan -input=false
        terraform apply -auto-approve
        ACR_NAME=$(terraform output -raw acr_name)
        echo "ACR_NAME=$ACR_NAME" >> $GITHUB_ENV
      env:
        ARM_CLIENT_ID: ${{ secrets.TF_VAR_CLIENT_ID }}
        ARM_CLIENT_SECRET: ${{ secrets.TF_VAR_CLIENT_SECRET }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.TF_VAR_SUBS_ID }}
        ARM_TENANT_ID: ${{ secrets.TF_VAR_TENANT_ID }}
    
    - name: Docker Login to ACR
      run: |
        az acr login --name $ACR_NAME

    - name: Push Docker Image to ACR
      run: |
        IMAGE_TAG="$ACR_NAME.azurecr.io/$APP_IMAGE"
        docker tag $APP_IMAGE $IMAGE_TAG
        docker push $IMAGE_TAG
        echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

    - name: Export IMAGE_TAG ENV for next Job
      id: image-tag
      run: |
        echo "ACR_NAME=$ACR_NAME" >> $GITHUB_OUTPUT
        echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_OUTPUT

  deploy:
    needs: [build_and_push_image]
    runs-on: ubuntu-latest

    env:
      ACR_NAME: ${{ needs.build_and_push_image.outputs.image-tag }}
      IMAGE_TAG: ${{ needs.build_and_push_image.outputs.image-tag }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Get AKS Credentials
      run: |
        az aks get-credentials --resource-group ${{ vars.TF_VAR_AZURE_RESOURCE_GROUP_NAME }} --name ntx-aks --overwrite-existing
    
    - name: Install kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: 'latest'

    - name: Deploy Application
      run: |
        sed -i "s|{{IMAGE_TAG}}|${{env.IMAGE_TAG}}|g" kubernetes/deployment.yaml
        kubectl create secret docker-registry acr-auth \
        --docker-server=${{env.ACR_NAME}}.azurecr.io \
        --docker-username=$(az acr credential show --name ${{env.ACR_NAME}} --query "username" --output tsv) \
        --docker-password=$(az acr credential show --name ${{env.ACR_NAME}} --query "passwords[0].value" --output tsv)
        kubectl describe secret acr-auth -n default
        kubectl apply -f kubernetes/deployment.yaml
        kubectl apply -f kubernetes/service.yaml
        cat kubernetes/deployment.yaml
        sleep 15
        kubectl get po -o wide
        kubectl get svc -n default