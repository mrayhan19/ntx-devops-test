name: ntx-devops-test-workflow

on:
  push:
    branches: [ "feature" ]

jobs:
  run_test:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: 18.x
        cache: 'npm'
    - run: npm i
    - run: npm run build --if-present
    - run: npm install chai@4.3.7
    - run: npm test

  build_and_push_image:

    needs: [run_test]

    runs-on: ubuntu-latest

    env:
      APP_NAME: ntx-app
      GITHUB_SHA: ${{ github.sha }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Build Docker OCI Image
      run: |
        SHORT_SHA=$(echo "${{env.GITHUB_SHA}}" | cut -c1-6)
        docker build . --file docker/Dockerfile --tag ${{env.APP_NAME}}:$SHORT_SHA
        echo "APP_IMAGE=${{env.APP_NAME}}:$SHORT_SHA" >> $GITHUB_ENV
    - name: Check Docker OCI Image
      run: |
        docker images | grep ${{env.APP_NAME}}

    - name: Provision ACR with Terraform
      run: |
        cd terraform
        terraform init
        terraform apply -auto-approve
        ACR_NAME=$(terraform output -raw acr_name)
        echo "ACR_NAME=$ACR_NAME" >> $GITHUB_ENV
#      env:
#        TF_VAR_azure_resource_group_name: ${{ env.AZURE_RESOURCE_GROUP_NAME }}
#        TF_VAR_azure_resource_group_location: ${{ env.AZURE_RESOURCE_GROUP_LOCATION }}
#        TF_VAR_acr_name: ${{ env.ACR_NAME }}
    
    - name: Docker Login to ACR
      run: |
        az acr login --name $ACR_NAME

    - name: Push Docker Image to ACR
      run: |
        IMAGE_TAG="$ACR_NAME.azurecr.io/$APP_IMAGE"
        docker tag $APP_IMAGE $IMAGE_TAG
        docker push $IMAGE_TAG
        echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
